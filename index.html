<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="복습스케줄">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>복습 스케줄러</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap');
:root{
  --bg:#0f1117;--surface:#181b24;--surface2:#1e2130;--surface3:#242840;
  --border:#252a3d;--border2:#2e3450
  --accent:#4f8ef7;--purple:#7c5cfc;--green:#22d98a;--red:#f5615c;
  --yellow:#f7b731;--pink:#f472b6;--cyan:#22d3ee;--orange:#fb923c;
  --text:#e8eaf6;--muted:#5a6380;--label:#8892b0;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overscroll-behavior:none;}
.shell{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;}

/* TOP BAR */
.topbar{padding:calc(var(--safe-top) + 14px) 16px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;}
.app-title{font-size:18px;font-weight:800;letter-spacing:-0.4px;}
.app-title span{background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.5px;}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--label);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.icon-btn:active{transform:scale(.92);}

/* BOTTOM TABS */
.bottom-nav{display:flex;background:var(--bg);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);flex-shrink:0;}
.nav-item{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;color:var(--muted);transition:all .15s;user-select:none;}
.nav-item.active{color:var(--accent);}
.nav-icon{font-size:22px;line-height:1;}
.nav-label{font-size:10px;margin-top:3px;font-weight:600;}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* SECTION */
.sec-hd{padding:18px 16px 8px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
.sec-hd-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--label);}

/* HERO */
.hero{padding:16px 16px 14px;background:linear-gradient(135deg,rgba(79,142,247,.09),rgba(124,92,252,.09));border-bottom:1px solid var(--border);}
.hero-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.8px;margin-bottom:6px;}
.hero-counts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.hc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 8px;text-align:center;}
.hc .n{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;line-height:1;}
.hc .l{font-size:10px;color:var(--muted);margin-top:2px;}
.hc.a .n{color:var(--accent);}
.hc.g .n{color:var(--green);}
.hc.r .n{color:var(--red);}

/* PROGRESS BAR */
.pbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:10px;}
.pbar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--purple));transition:width .4s;}

/* ── NEW PROBLEM INPUT ── */
.input-card{margin:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.input-card-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.input-card-header-left{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;}
.collapse-arrow{font-size:12px;color:var(--muted);transition:transform .2s;}
.collapse-arrow.open{transform:rotate(180deg);}
.input-body{padding:0 14px 14px;display:none;}
.input-body.open{display:block;}

.field-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;margin-top:12px;}
.text-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;padding:10px 12px;transition:border .15s;}
.text-input:focus{outline:none;border-color:var(--accent);}
.mono-input{font-family:'JetBrains Mono',monospace;}

.subj-chips{display:flex;flex-wrap:wrap;gap:6px;}
.subj-chip{padding:6px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;flex-shrink:0;}
.subj-chip:active{transform:scale(.95);}
.subj-chip.sel{font-weight:700;}

.ox-row{display:flex;gap:8px;}
.ox-big{flex:1;height:44px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:800;cursor:pointer;transition:all .15s;}
.ox-big:active{transform:scale(.95);}
.ox-big.o-sel{background:rgba(34,217,138,.15);border-color:var(--green);color:var(--green);}
.ox-big.x-sel{background:rgba(245,97,92,.15);border-color:var(--red);color:var(--red);}

.add-btn{width:100%;margin-top:12px;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;}
.add-btn:active{transform:scale(.97);opacity:.9;}

/* ── REVIEW CARDS ── */
.rev-card{margin:0 16px 8px;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .15s;}
.rev-card-inner{padding:13px 14px;display:flex;align-items:center;gap:10px;}
.rev-card.done-card{opacity:.55;}
.rev-lft{flex:1;min-width:0;}
.rev-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px;}
.q-num{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--accent);}
.round-pip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.r1{background:rgba(79,142,247,.15);color:var
