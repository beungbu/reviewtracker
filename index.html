<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="복습스케줄">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>복습 스케줄러</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600;700&display=swap');
:root{
  --bg:#0f1117;--surface:#181b24;--surface2:#1e2130;--surface3:#242840;
  --border:#252a3d;--border2:#2e3450;
  --accent:#4f8ef7;--purple:#7c5cfc;--green:#22d98a;--red:#f5615c;
  --yellow:#f7b731;--pink:#f472b6;--cyan:#22d3ee;--orange:#fb923c;
  --text:#e8eaf6;--muted:#5a6380;--label:#8892b0;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overscroll-behavior:none;}
.shell{display:flex;flex-direction:column;height:100dvh;max-width:480px;margin:0 auto;}

/* TOP BAR */
.topbar{padding:calc(var(--safe-top) + 14px) 16px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;}
.app-title{font-size:18px;font-weight:800;letter-spacing:-0.4px;}
.app-title span{background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.topbar-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:.5px;}
.icon-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--label);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.icon-btn:active{transform:scale(.92);}

/* BOTTOM TABS */
.bottom-nav{display:flex;background:var(--bg);border-top:1px solid var(--border);padding-bottom:var(--safe-bottom);flex-shrink:0;}
.nav-item{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;color:var(--muted);transition:all .15s;user-select:none;}
.nav-item.active{color:var(--accent);}
.nav-icon{font-size:22px;line-height:1;}
.nav-label{font-size:10px;margin-top:3px;font-weight:600;}

/* CONTENT */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* SECTION */
.sec-hd{padding:18px 16px 8px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
.sec-hd-count{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--label);}

/* HERO */
.hero{padding:16px 16px 14px;background:linear-gradient(135deg,rgba(79,142,247,.09),rgba(124,92,252,.09));border-bottom:1px solid var(--border);}
.hero-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.8px;margin-bottom:6px;}
.hero-counts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;}
.hc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 8px;text-align:center;}
.hc .n{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;line-height:1;}
.hc .l{font-size:10px;color:var(--muted);margin-top:2px;}
.hc.a .n{color:var(--accent);}
.hc.g .n{color:var(--green);}
.hc.r .n{color:var(--red);}

/* PROGRESS BAR */
.pbar{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:10px;}
.pbar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--purple));transition:width .4s;}

/* ── NEW PROBLEM INPUT ── */
.input-card{margin:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.input-card-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.input-card-header-left{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;}
.collapse-arrow{font-size:12px;color:var(--muted);transition:transform .2s;}
.collapse-arrow.open{transform:rotate(180deg);}
.input-body{padding:0 14px 14px;display:none;}
.input-body.open{display:block;}

.field-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px;margin-top:12px;}
.text-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;padding:10px 12px;transition:border .15s;}
.text-input:focus{outline:none;border-color:var(--accent);}
.mono-input{font-family:'JetBrains Mono',monospace;}

.subj-chips{display:flex;flex-wrap:wrap;gap:6px;}
.subj-chip{padding:6px 11px;border-radius:20px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .12s;flex-shrink:0;}
.subj-chip:active{transform:scale(.95);}
.subj-chip.sel{font-weight:700;}

.ox-row{display:flex;gap:8px;}
.ox-big{flex:1;height:44px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:800;cursor:pointer;transition:all .15s;}
.ox-big:active{transform:scale(.95);}
.ox-big.o-sel{background:rgba(34,217,138,.15);border-color:var(--green);color:var(--green);}
.ox-big.x-sel{background:rgba(245,97,92,.15);border-color:var(--red);color:var(--red);}

.add-btn{width:100%;margin-top:12px;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .15s;}
.add-btn:active{transform:scale(.97);opacity:.9;}

/* ── REVIEW CARDS ── */
.rev-card{margin:0 16px 8px;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .15s;}
.rev-card-inner{padding:13px 14px;display:flex;align-items:center;gap:10px;}
.rev-card.done-card{opacity:.55;}
.rev-lft{flex:1;min-width:0;}
.rev-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:4px;}
.q-num{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--accent);}
.round-pip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.r1{background:rgba(79,142,247,.15);color:var(--accent);}
.r2{background:rgba(34,217,138,.15);color:var(--green);}
.r3{background:rgba(247,183,49,.15);color:var(--yellow);}
.r4{background:rgba(244,114,182,.15);color:var(--pink);}
.r5{background:rgba(124,92,252,.15);color:var(--purple);}
.subj-pip{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;}
.rev-sub{font-size:11px;color:var(--muted);}
.rev-rgt{display:flex;flex-direction:column;gap:5px;align-items:flex-end;flex-shrink:0;}
.check-btn{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.check-btn:active{transform:scale(.9);}
.check-btn.checked{background:rgba(34,217,138,.15);border-color:var(--green);color:var(--green);}
.more-btn{font-size:11px;color:var(--muted);cursor:pointer;padding:2px 4px;text-decoration:underline;background:none;border:none;font-family:'Noto Sans KR',sans-serif;}

/* OX INLINE */
.ox-inline{display:flex;gap:4px;margin-top:4px;}
.ox-sm{width:32px;height:26px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;transition:all .12s;}
.ox-sm:active{transform:scale(.9);}
.ox-sm.o-a{background:rgba(34,217,138,.15);border-color:var(--green);color:var(--green);}
.ox-sm.x-a{background:rgba(245,97,92,.15);border-color:var(--red);color:var(--red);}

/* EMPTY STATE */
.empty{margin:28px 16px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:30px 20px;text-align:center;color:var(--muted);}
.empty .em{font-size:38px;margin-bottom:10px;}
.empty .msg{font-size:14px;font-weight:600;color:var(--label);}
.empty .sub{font-size:12px;margin-top:5px;line-height:1.5;}

/* ── CALENDAR PAGE ── */
.cal-wrap{padding:12px 16px 0;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cal-nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--label);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-nav-btn:active{transform:scale(.9);}
.cal-month{font-size:16px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px;}
.cal-dow{text-align:center;font-size:10px;font-weight:700;color:var(--muted);padding:4px 0;}
.cal-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;transition:all .12s;background:transparent;}
.cal-day:active{transform:scale(.9);}
.cal-day .dn{font-size:13px;font-weight:600;line-height:1;}
.cal-day .dc{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap;justify-content:center;}
.cal-day .dot{width:5px;height:5px;border-radius:50%;}
.cal-day.today .dn{color:var(--accent);font-weight:900;}
.cal-day.selected{background:rgba(79,142,247,.18);border:1.5px solid var(--accent);}
.cal-day.has-items{background:var(--surface);}
.cal-day.other-month .dn{color:var(--border);}
.cal-day.sunday .dn{color:var(--red);}
.cal-day.saturday .dn{color:var(--accent);}

.cal-detail{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;}
.cal-detail-title{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.cal-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.cal-item:last-child{border-bottom:none;}
.cal-item-num{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--accent);min-width:44px;}
.cal-item-info{flex:1;}
.cal-item-sub{font-size:11px;color:var(--muted);margin-top:1px;}

/* ── HISTORY PAGE ── */
.hist-filter{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;}
.hist-filter::-webkit-scrollbar{display:none;}
.chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;transition:all .12s;flex-shrink:0;}
.chip.active{background:rgba(79,142,247,.15);border-color:var(--accent);color:var(--accent);}

.hist-card{margin:0 16px 8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;}
.hist-top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.hist-num{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--accent);}
.hist-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.hist-rounds{display:flex;gap:4px;flex-wrap:wrap;}
.hist-round-dot{display:flex;align-items:center;gap:2px;padding:3px 7px;border-radius:8px;border:1px solid var(--border);font-size:11px;font-weight:600;}
.hist-round-dot.o{background:rgba(34,217,138,.1);border-color:var(--green);color:var(--green);}
.hist-round-dot.x{background:rgba(245,97,92,.1);border-color:var(--red);color:var(--red);}
.hist-round-dot.pending{color:var(--muted);}

/* ── SETTINGS PAGE ── */
.settings-wrap{padding:16px;}
.set-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;}
.set-title{font-size:13px;font-weight:700;margin-bottom:12px;}
.subj-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.subj-row:last-child{border-bottom:none;}
.subj-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.subj-name{flex:1;font-size:13px;}
.del-btn{width:24px;height:24px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--red);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.color-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px;}
.cswatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s;}
.cswatch.sel{border-color:#fff;transform:scale(1.15);}
.add-row{display:flex;gap:8px;align-items:center;}
.btn-sm{padding:9px 14px;border-radius:10px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s;}
.btn-sm:active{transform:scale(.95);}
.btn-pri{background:linear-gradient(135deg,var(--accent),var(--purple));color:#fff;}
.btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--label);}
.btn-danger{background:rgba(245,97,92,.1);border:1px solid var(--red);color:var(--red);}
.btn-full{width:100%;padding:13px;border-radius:12px;border:none;font-family:'Noto Sans KR',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:6px;}
.btn-full:active{transform:scale(.97);}

/* interval info */
.int-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);}
.int-row:last-child{border-bottom:none;}
.int-badge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;min-width:52px;text-align:center;}
.int-label{font-size:12px;color:var(--label);}

/* ── OVERLAY / BOTTOM SHEET ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:flex-end;backdrop-filter:blur(4px);}
.overlay.open{display:flex;}
.sheet{width:100%;max-width:480px;margin:0 auto;background:var(--surface2);border-radius:20px 20px 0 0;max-height:88dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideUp .25s ease;padding-bottom:calc(var(--safe-bottom)+20px);}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px;}
.sh-title{padding:0 20px 4px;font-size:18px;font-weight:800;}
.sh-sub{padding:0 20px 14px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);}
.sh-sec{padding:14px 20px 0;}
.sh-lbl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.sh-rnd{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.sh-rnd:last-child{border-bottom:none;}
.rnd-info{flex:1;}
.rnd-name{font-size:13px;font-weight:600;}
.rnd-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
.rnd-date.hl{color:var(--accent);font-weight:700;}
.rnd-date.od{color:var(--red);font-weight:700;}
.ox-g{display:flex;gap:6px;}
.ox-t{width:38px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;transition:all .12s;}
.ox-t:active{transform:scale(.9);}
.ox-t.ao{background:rgba(34,217,138,.15);border-color:var(--green);color:var(--green);}
.ox-t.ax{background:rgba(245,97,92,.15);border-color:var(--red);color:var(--red);}
.date-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;padding:10px 12px;}
.date-input:focus{outline:none;border-color:var(--accent);}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5) hue-rotate(180deg);}
textarea.text-input{resize:none;}

/* SNOOZE PICKER */
.snooze-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.snooze-opt{padding:12px 8px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--label);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:all .12s;}
.snooze-opt:active{transform:scale(.95);}
.snooze-opt.sel{background:rgba(79,142,247,.15);border-color:var(--accent);color:var(--accent);}
.snooze-opt .sd{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;margin-bottom:2px;}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-bottom)+80px);left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;z-index:200;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.toast.show{opacity:1;}

/* ── BADGE / TAG ── */
.badge-done{font-size:10px;padding:2px 7px;border-radius:8px;background:rgba(34,217,138,.12);color:var(--green);font-weight:700;}
.badge-miss{font-size:10px;padding:2px 7px;border-radius:8px;background:rgba(245,97,92,.12);color:var(--red);font-weight:700;}

/* CAL DATE INPUT PANEL */
.cal-input-panel{margin-top:14px;border-top:1px solid var(--border);padding-top:14px;}
.cal-input-toggle{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;cursor:pointer;user-select:none;padding:2px 0;}
.cal-input-toggle .ci-arrow{font-size:11px;color:var(--muted);transition:transform .2s;margin-left:auto;}
.cal-input-toggle .ci-arrow.open{transform:rotate(180deg);}
.cal-input-body{display:none;margin-top:10px;}
.cal-input-body.open{display:block;}
/* CAL DETAIL ACTION ROW */
.cal-item-action{display:flex;gap:5px;flex-shrink:0;align-items:center;}
.cal-ox-sm{width:30px;height:26px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;transition:all .12s;}
.cal-ox-sm:active{transform:scale(.9);}
.cal-ox-sm.o-a{background:rgba(34,217,138,.15);border-color:var(--green);color:var(--green);}
.cal-ox-sm.x-a{background:rgba(245,97,92,.15);border-color:var(--red);color:var(--red);}
/* MISSED tag */
.missed-tag{font-size:10px;padding:1px 6px;border-radius:6px;background:rgba(245,97,92,.12);color:var(--red);font-weight:700;}
/* WEEK HEATMAP */
.week-row{display:flex;gap:4px;margin-top:8px;}
.week-cell{flex:1;height:32px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:1px solid var(--border);gap:1px;}
.week-day-label{font-size:8px;opacity:.7;}
.wc-none{background:var(--surface2);color:var(--muted);}
.wc-low{background:rgba(79,142,247,.15);color:var(--accent);}
.wc-mid{background:rgba(79,142,247,.3);color:var(--accent);}
.wc-hi{background:rgba(79,142,247,.55);color:#fff;}
</style>
</head>
<body>
<div class="shell">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-row">
      <div>
        <div class="app-title">📚 <span>복습 스케줄러</span></div>
        <div class="topbar-date" id="topDate"></div>
      </div>
      <div style="display:flex;gap:6px;">
        <button class="icon-btn" title="내보내기" onclick="exportData()">💾</button>
        <button class="icon-btn" title="불러오기" onclick="importTrigger()">📂</button>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content"></div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <div class="nav-item active" id="nav-today" onclick="showPage('today')">
      <div class="nav-icon">📅</div><div class="nav-label">오늘</div>
    </div>
    <div class="nav-item" id="nav-cal" onclick="showPage('cal')">
      <div class="nav-icon">🗓️</div><div class="nav-label">캘린더</div>
    </div>
    <div class="nav-item" id="nav-hist" onclick="showPage('hist')">
      <div class="nav-icon">📋</div><div class="nav-label">전체</div>
    </div>
    <div class="nav-item" id="nav-settings" onclick="showPage('settings')">
      <div class="nav-icon">⚙️</div><div class="nav-label">설정</div>
    </div>
  </div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSheetOn(event)">
  <div class="sheet"><div class="sh-handle"></div><div id="sheetInner"></div></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileIn" accept=".json" style="display:none" onchange="importFile(event)">

<script>
// ════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════
// O/X 별 다음 차수까지 간격 (일)
// O: 2 → 4 → 7 → 16 → 30 (이후 완료 조건 체크)
// X: 1 → 2 → 4 → 7 → 이후 7일 반복
const INTERVALS_OK  = [1, 3, 7, 14, 30];
const INTERVALS_FAIL= [1, 1, 3,  7, 14];
const STEP_O = [2, 4, 7, 16, 30];
const STEP_X = [1, 2, 4, 7, 7];
const STEP_INTERVALS = STEP_O;
const MIN_ROUNDS = 5;
const MAX_ROUNDS = 99;
const ROUND_NAMES = ['1차','2차','3차','4차','5차','6차','7차','8차','9차','10차'];
const ROUND_CLASSES = ['r1','r2','r3','r4','r5','r1','r2','r3','r4','r5'];

const PALETTE = ['#4f8ef7','#22d98a','#f7b731','#f472b6','#7c5cfc','#f5615c','#38bdf8','#fb923c','#a3e635','#e879f9'];

const DEFAULT_SUBJECTS = [
  {id:'s1',name:'재무회계',color:'#4f8ef7'},
  {id:'s2',name:'원가관리회계',color:'#22d98a'},
  {id:'s3',name:'세법',color:'#f7b731'},
  {id:'s4',name:'회계감사',color:'#f472b6'},
  {id:'s5',name:'경영학',color:'#7c5cfc'},
  {id:'s6',name:'경제학',color:'#f5615c'},
  {id:'s7',name:'상법',color:'#38bdf8'},
];

// ════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════
/*
  state = {
    subjects: [{id,name,color}],
    problems: {
      [pid]: {
        id,
        num,          // string, e.g. "15", "재무-3"
        subjectId,
        createdDate,  // "YYYY-MM-DD" when first solved
        memo,
        rounds: [
          {
            round,        // 0-based index
            scheduledDate,// "YYYY-MM-DD"
            result,       // null | 'O' | 'X'
            completedDate,// "YYYY-MM-DD" | null
          }
        ]
      }
    }
  }
*/
function defaultState(){
  return {subjects:JSON.parse(JSON.stringify(DEFAULT_SUBJECTS)),problems:{}};
}

let S = loadState() || defaultState();

// UI state
let page = 'today';
let inputOpen = true;
let inputSubj = S.subjects[0]?.id || '';
let inputOX = null;
let pickedColor = PALETTE[0];
let histFilter = 'all';
let calYear, calMonth, calSelectedDate;
let calInputOpen = false;
let calInputOX = null;
let calInputSubj = S.subjects[0]?.id || '';

function saveState(){ localStorage.setItem('rsched_v1', JSON.stringify(S)); }
function loadState(){ try{ return JSON.parse(localStorage.getItem('rsched_v1')); }catch{ return null; } }

// ════════════════════════════════════════════
//  DATE UTILS
// ════════════════════════════════════════════
function today(){ return new Date().toISOString().slice(0,10); }
function addDays(ds,d){ if(!ds)return null; const dt=new Date(ds+'T00:00:00'); dt.setDate(dt.getDate()+d); return dt.toISOString().slice(0,10); }
function fmtShort(ds){ if(!ds)return'—'; const d=new Date(ds+'T00:00:00'); return`${d.getMonth()+1}/${d.getDate()}`; }
function fmtFull(ds){ if(!ds)return'—'; const d=new Date(ds+'T00:00:00'); return`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }
function fmtKo(ds){ if(!ds)return'—'; const d=new Date(ds+'T00:00:00'); const days=['일','월','화','수','목','금','토']; return`${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`; }
function genId(){ return 'p'+Date.now()+Math.random().toString(36).slice(2,5); }
function todayKo(){ const d=new Date(); const days=['일','월','화','수','목','금','토']; return`${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`; }

// ════════════════════════════════════════════
//  BUSINESS LOGIC
// ════════════════════════════════════════════
function getSubj(id){ return S.subjects.find(s=>s.id===id)||null; }

function buildSchedule(createdDate){
  // 1차만 생성, 이후 차수는 체크할 때마다 동적으로 추가
  return [{
    round: 0,
    scheduledDate: addDays(createdDate, STEP_INTERVALS[0]),
    result: null,
    completedDate: null
  }];
}

function addProblem(num, subjectId, createdDate, firstResult, memo){
  // firstResult = 'O' or 'X' — the result when they first solved it
  const id = genId();
  const rounds = buildSchedule(createdDate);
  // If first solve was wrong, reschedule round 0 sooner (it's already +1 day, keep as is)
  // Store the initial solve info as a property
  S.problems[id] = {
    id, num, subjectId, createdDate,
    firstResult, // initial solve result (not a review round)
    memo: memo||'',
    rounds
  };
  saveState();
  return id;
}

function setRoundResult(pid, roundIdx, result, date){
  const p = S.problems[pid];
  if(!p) return;
  const round = p.rounds[roundIdx];
  if(!round) return;
  round.result = result;
  round.completedDate = date || today();
  saveState();
}

function snoozeRound(pid, roundIdx, newDate){
  const p = S.problems[pid];
  if(!p) return;
  p.rounds[roundIdx].scheduledDate = newDate;
  saveState();
}

// Get all reviews scheduled for a given date
function getReviewsForDate(ds){
  return Object.values(S.problems).flatMap(p=>
    p.rounds.filter(r=>r.scheduledDate===ds).map(r=>({p, round:r}))
  ).sort((a,b)=>{
    const na=parseFloat(a.p.num)||0, nb=parseFloat(b.p.num)||0;
    return na!==nb?na-nb:a.p.id.localeCompare(b.p.id);
  });
}

// Problems created on a date
function getCreatedOnDate(ds){
  return Object.values(S.problems).filter(p=>p.createdDate===ds)
    .sort((a,b)=>{ const na=parseFloat(a.num)||0,nb=parseFloat(b.num)||0; return na!==nb?na-nb:a.id.localeCompare(b.id); });
}

// All dates that have any activity
function getDatesWithActivity(){
  const set = new Set();
  Object.values(S.problems).forEach(p=>{
    set.add(p.createdDate);
    p.rounds.forEach(r=>set.add(r.scheduledDate));
  });
  return set;
}

// Stats for today
function todayStats(){
  const td = today();
  const revs = getReviewsForDate(td);
  const done = revs.filter(({round})=>round.result!==null).length;
  const pending = revs.filter(({round})=>round.result===null).length;
  return {total:revs.length, done, pending};
}

// ════════════════════════════════════════════
//  PAGE NAVIGATION
// ════════════════════════════════════════════
function showPage(p){
  page = p;
  ['today','cal','hist','settings'].forEach(n=>{
    document.getElementById('nav-'+n)?.classList.toggle('active',n===p);
  });
  const area = document.getElementById('content');
  if(p==='today') area.innerHTML = renderToday();
  else if(p==='cal') area.innerHTML = renderCal();
  else if(p==='hist') area.innerHTML = renderHist();
  else area.innerHTML = renderSettings();
}

// ════════════════════════════════════════════
//  TODAY PAGE
// ════════════════════════════════════════════
function renderToday(){
  const td = today();
  const st = todayStats();
  const pct = st.total ? Math.round(st.done/st.total*100) : 0;
  const reviews = getReviewsForDate(td);
  const created = getCreatedOnDate(td);
  const pendingRevs = reviews.filter(({round})=>round.result===null);
  const doneRevs = reviews.filter(({round})=>round.result!==null);

  // count missed (scheduled before today, not done)
  const missed = Object.values(S.problems).flatMap(p=>
    p.rounds.filter(r=>r.scheduledDate<td&&r.result===null)
  ).length;

  // subject chips
  const subjChips = S.subjects.map(s=>{
    const sel = inputSubj===s.id;
    return `<div class="subj-chip ${sel?'sel':''}"
      style="${sel?`border-color:${s.color};color:${s.color};background:${s.color}18`:''}"
      onclick="pickSubj('${s.id}','${s.color}')">${s.name}</div>`;
  }).join('');

  let html = `
  <div class="hero">
    <div class="hero-date">${todayKo()}</div>
    <div class="hero-counts">
      <div class="hc a"><div class="n">${st.pending}</div><div class="l">복습 예정</div></div>
      <div class="hc g"><div class="n">${st.done}</div><div class="l">완료</div></div>
      <div class="hc r"><div class="n">${missed}</div><div class="l">밀린 것</div></div>
    </div>
    <div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>
    <div style="font-size:10px;color:var(--muted);text-align:right;margin-top:4px">${pct}% 완료</div>
  </div>

  <!-- NEW PROBLEM INPUT -->
  <div class="input-card">
    <div class="input-card-header" onclick="toggleInput()">
      <div class="input-card-header-left">✏️ 오늘 푼 문제 입력</div>
      <span class="collapse-arrow ${inputOpen?'open':''}">▼</span>
    </div>
    <div class="input-body ${inputOpen?'open':''}">
      <div class="field-label">과목</div>
      <div class="subj-chips">${subjChips}</div>

      <div class="field-label">문제 번호</div>
      <input class="text-input mono-input" id="inNum" type="text"
        placeholder="예: 15  또는  1-10  또는  A3"
        value="" onkeydown="if(event.key==='Enter')addProblems()">

      <div class="field-label">결과</div>
      <div class="ox-row">
        <button class="ox-big ${inputOX==='O'?'o-sel':''}" onclick="pickOX('O')">⭕ 맞음</button>
        <button class="ox-big ${inputOX==='X'?'x-sel':''}" onclick="pickOX('X')">❌ 틀림</button>
      </div>

      <div class="field-label">메모 (선택)</div>
      <textarea class="text-input" id="inMemo" rows="2" placeholder="핵심 키워드, 틀린 이유 ..."></textarea>

      <button class="add-btn" onclick="addProblems()">+ 복습 스케줄에 추가</button>
    </div>
  </div>`;

  // MISSED
  if(missed>0){
    const missedItems = Object.values(S.problems).flatMap(p=>
      p.rounds.filter(r=>r.scheduledDate<td&&r.result===null).map(r=>({p,round:r}))
    ).sort((a,b)=>a.round.scheduledDate.localeCompare(b.round.scheduledDate));

    html+=`<div class="sec-hd"><span>⚠️ 밀린 복습</span><span class="sec-hd-count">${missed}건</span></div>`;
    missedItems.forEach(({p,round})=>{ html+=revCard(p,round,true); });
  }

  // TODAY PENDING
  if(pendingRevs.length>0){
    html+=`<div class="sec-hd"><span>📌 오늘 복습 목록</span><span class="sec-hd-count">${pendingRevs.length}건</span></div>`;
    pendingRevs.forEach(({p,round})=>{ html+=revCard(p,round,false); });
  }

  // TODAY DONE
  if(doneRevs.length>0){
    html+=`<div class="sec-hd">✅ 완료된 복습<span class="sec-hd-count">${doneRevs.length}건</span></div>`;
    doneRevs.forEach(({p,round})=>{ html+=revCard(p,round,false,true); });
  }

  // NEW problems created today
  if(created.length>0){
    html+=`<div class="sec-hd">📝 오늘 처음 푼 문제<span class="sec-hd-count">${created.length}건</span></div>`;
    created.forEach(p=>{
      const subj=getSubj(p.subjectId);
      const sTag=subj?`<span class="subj-pip" style="background:${subj.color}18;color:${subj.color}">${subj.name}</span>`:'';
      const res=p.firstResult==='O'?`<span style="color:var(--green);font-size:12px">⭕</span>`:`<span style="color:var(--red);font-size:12px">❌</span>`;
      html+=`<div class="rev-card" style="cursor:pointer" onclick="openDetail('${p.id}')">
        <div class="rev-card-inner">
          <div class="rev-lft">
            <div class="rev-top"><span class="q-num">${p.num}</span>${sTag}${res}</div>
            <div class="rev-sub">${p.memo||'메모 없음'} · 1차 복습 ${fmtShort(p.rounds[0]?.scheduledDate)}</div>
          </div>
        </div>
      </div>`;
    });
  }

  if(reviews.length===0 && created.length===0 && missed===0){
    html+=`<div class="empty"><div class="em">📖</div><div class="msg">오늘 일정이 없어요</div><div class="sub">위에서 오늘 푼 문제를 입력하면<br>자동으로 복습 일정이 생성돼요</div></div>`;
  }

  html+=`<div style="height:20px"></div>`;
  return html;
}

function revCard(p, round, isMissed, isDone=false){
  const subj=getSubj(p.subjectId);
  const sTag=subj?`<span class="subj-pip" style="background:${subj.color}18;color:${subj.color}">${subj.name}</span>`:'';
  const rClass=ROUND_CLASSES[round.round];
  const rName=ROUND_NAMES[round.round];
  const val=round.result;
  const dateInfo=isMissed?`⚠️ ${fmtShort(round.scheduledDate)} 밀림`:`${rName}`;

  return `<div class="rev-card ${isDone?'done-card':''}" id="rc_${p.id}_${round.round}">
    <div class="rev-card-inner">
      <div class="rev-lft">
        <div class="rev-top">
          <span class="q-num">${p.num}</span>
          <span class="round-pip ${rClass}">${rName}</span>
          ${sTag}
        </div>
        <div class="rev-sub">${dateInfo}${p.memo?' · '+p.memo:''}</div>
        ${!isDone?`<div class="ox-inline">
          <button class="ox-sm ${val==='O'?'o-a':''}" onclick="markRound('${p.id}',${round.round},'O')">O</button>
          <button class="ox-sm ${val==='X'?'x-a':''}" onclick="markRound('${p.id}',${round.round},'X')">X</button>
          <button class="more-btn" onclick="openSnooze('${p.id}',${round.round})">📅 미루기</button>
        </div>`:''}
        ${isDone?`<div style="margin-top:4px">${val==='O'?'<span class="badge-done">정답 ✓</span>':'<span class="badge-miss">오답 ✗</span>'}</div>`:''}
      </div>
      <button class="check-btn ${val==='O'?'checked':''}" onclick="markRound('${p.id}',${round.round},'O')">✓</button>
    </div>
  </div>`;
}

function toggleInput(){
  inputOpen=!inputOpen;
  document.getElementById('content').innerHTML=renderToday();
}

function pickSubj(id,color){
  inputSubj=id;
  const subjName=S.subjects.find(s=>s.id===id)?.name||'';
  document.querySelectorAll('.subj-chip').forEach(e=>{
    const mine=subjName&&e.textContent.trim()===subjName;
    e.classList.toggle('sel',mine);
    if(mine){ e.style.borderColor=color; e.style.color=color; e.style.background=color+'18'; }
    else{ e.style.borderColor=''; e.style.color=''; e.style.background=''; }
  });
}

function pickOX(v){
  inputOX=v;
  document.querySelectorAll('.ox-big').forEach(b=>{
    b.classList.remove('o-sel','x-sel');
  });
  const btns=document.querySelectorAll('.ox-big');
  if(v==='O') btns[0].classList.add('o-sel');
  else btns[1].classList.add('x-sel');
}

function addProblems(){
  const raw=(document.getElementById('inNum')?.value||'').trim();
  if(!raw){ showToast('문제 번호를 입력해주세요'); return; }
  if(!inputOX){ showToast('맞았는지 틀렸는지 체크해주세요'); return; }
  const memo=(document.getElementById('inMemo')?.value||'').trim();
  const td=today();

  // Parse: comma separated, each part can be "N" or "N-M"
  const parts=raw.split(',').map(p=>p.trim()).filter(Boolean);
  let count=0;
  parts.forEach(part=>{
    const dash=part.split('-');
    if(dash.length===2&&!isNaN(dash[0])&&!isNaN(dash[1])){
      const from=parseInt(dash[0]),to=parseInt(dash[1]);
      for(let n=from;n<=to;n++){ addProblem(String(n),inputSubj,td,inputOX,memo); count++; }
    } else {
      addProblem(part,inputSubj,td,inputOX,memo); count++;
    }
  });

  inputOX=null;
  showToast(`${count}문제 추가 ✅ 복습 일정 자동 생성됨`);
  showPage('today');
}

// 완료 조건: 최소 5차 이상 + 마지막 2번 연속 O
function isCompleted(p){
  const done = p.rounds.filter(r => r.result !== null);
  if(done.length < MIN_ROUNDS) return false;
  const last2 = done.slice(-2);
  return last2.length === 2 && last2[0].result === 'O' && last2[1].result === 'O';
}

// 체크한 날 기준으로 다음 차수 생성
function rescheduleNext(p, roundIdx, completedDate, result){
  if(isCompleted(p)) return; // 완료 조건 충족하면 생성 안 함
  const nextIdx = roundIdx + 1;
  const intervals = result === 'X' ? STEP_X : STEP_O;
  const interval = intervals[Math.min(roundIdx, intervals.length - 1)];
  const nextDate = addDays(completedDate, interval);
  if(p.rounds[nextIdx]){
    p.rounds[nextIdx].scheduledDate = nextDate;
  } else {
    p.rounds.push({
      round: nextIdx,
      scheduledDate: nextDate,
      result: null,
      completedDate: null
    });
  }
}

function markRound(pid, roundIdx, result){
  const p=S.problems[pid]; if(!p)return;
  const round=p.rounds[roundIdx]; if(!round)return;
  const prev=round.result;
  if(prev===result){ round.result=null; round.completedDate=null; saveState(); showPage(page); return; }
  round.result=result;
  round.completedDate=today();
  rescheduleNext(p, roundIdx, today(), result);
  saveState();
  showPage(page);
  showToast(result==='O'?'✅ 정답 기록':'❌ 오답 기록');
}

// ════════════════════════════════════════════
//  SNOOZE SHEET
// ════════════════════════════════════════════
let snoozeTarget={pid:null,roundIdx:null};
function openSnooze(pid,roundIdx){
  snoozeTarget={pid,roundIdx};
  const p=S.problems[pid]; if(!p)return;
  const round=p.rounds[roundIdx];
  const opts=[
    {label:'내일',days:1},{label:'2일 후',days:2},{label:'3일 후',days:3},
    {label:'1주 후',days:7},{label:'2주 후',days:14},
  ];
  const td=today();
  const optHtml=opts.map(o=>{
    const nd=addDays(td,o.days);
    return`<div class="snooze-opt" onclick="confirmSnooze('${nd}')">
      <div class="sd">+${o.days}일</div>${o.label}<br>
      <span style="font-size:10px;color:var(--muted)">${fmtShort(nd)}</span>
    </div>`;
  }).join('');

  document.getElementById('sheetInner').innerHTML=`
    <div class="sh-title">📅 미루기</div>
    <div class="sh-sub">${p.num} · ${ROUND_NAMES[roundIdx]} · 현재 ${fmtShort(round.scheduledDate)}</div>
    <div class="sh-sec">
      <div class="sh-lbl" style="margin-bottom:10px">언제로 미룰까요?</div>
      <div class="snooze-grid">${optHtml}</div>
      <div style="margin-top:12px;">
        <div class="sh-lbl">직접 날짜 선택</div>
        <input type="date" class="date-input" id="snoozeDateIn" value="${round.scheduledDate}">
        <button class="btn-full btn-pri" style="margin-top:8px" onclick="confirmSnoozeCustom()">이 날짜로 미루기</button>
      </div>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

function confirmSnooze(date){
  const {pid,roundIdx}=snoozeTarget;
  snoozeRound(pid,roundIdx,date);
  closeSheet();
  showPage(page);
  showToast(`${fmtShort(date)}로 이동됨`);
}

function confirmSnoozeCustom(){
  const date=document.getElementById('snoozeDateIn')?.value;
  if(!date){ showToast('날짜를 선택해주세요'); return; }
  confirmSnooze(date);
}

// ════════════════════════════════════════════
//  DETAIL SHEET
// ════════════════════════════════════════════
function openDetail(pid){
  const p=S.problems[pid]; if(!p)return;
  const subj=getSubj(p.subjectId);
  const td=today();

  const subjOpts=S.subjects.map(s=>`
    <div class="subj-chip ${p.subjectId===s.id?'sel':''}"
      style="${p.subjectId===s.id?`border-color:${s.color};color:${s.color};background:${s.color}18`:''}"
      onclick="changeDetailSubj('${pid}','${s.id}',this,'${s.color}')">${s.name}</div>`).join('');

  let rounds='';
  p.rounds.forEach((r,i)=>{
    const isToday=r.scheduledDate===td, isOd=r.scheduledDate<td&&r.result===null;
    let dc='rnd-date'; if(isToday)dc+=' hl'; else if(isOd)dc+=' od';
    rounds+=`<div class="sh-rnd">
      <span class="round-pip ${ROUND_CLASSES[i]}" style="min-width:38px">${ROUND_NAMES[i]}</span>
      <div class="rnd-info">
        <div class="rnd-name">${ROUND_NAMES[i]}</div>
        <div class="${dc}">${fmtFull(r.scheduledDate)}${isToday?' 📌':isOd?' ⚠️':''}</div>
      </div>
      <div class="ox-g">
        <button class="ox-t ${r.result==='O'?'ao':''}" onclick="setDetailRound('${pid}',${i},'O')">O</button>
        <button class="ox-t ${r.result==='X'?'ax':''}" onclick="setDetailRound('${pid}',${i},'X')">X</button>
      </div>
    </div>`;
  });

  document.getElementById('sheetInner').innerHTML=`
    <div class="sh-title">${p.num}</div>
    <div class="sh-sub">${subj?.name||'과목 없음'} · 최초 ${fmtFull(p.createdDate)} · ${p.firstResult==='O'?'⭕':'❌'}</div>
    <div class="sh-sec">
      <div class="sh-lbl">과목 변경</div>
      <div class="subj-chips" id="detSubjPicker" style="gap:6px;flex-wrap:wrap;display:flex;">${subjOpts}</div>
    </div>
    <div class="sh-sec" style="margin-top:4px;">
      <div class="sh-lbl">문제 번호 수정</div>
      <div style="display:flex;gap:8px;">
        <input class="text-input mono-input" id="editNum" value="${p.num}" style="flex:1;padding:9px 12px;">
        <button class="btn-sm btn-pri" onclick="saveDetailNum('${pid}')">저장</button>
      </div>
    </div>
    <div class="sh-sec" style="margin-top:4px;">
      <div class="sh-lbl">복습 일정</div>
      ${rounds}
    </div>
    <div class="sh-sec" style="margin-top:10px;">
      <div class="sh-lbl">메모</div>
      <textarea class="text-input" rows="3" placeholder="메모 ..."
        oninput="S.problems['${pid}'].memo=this.value;saveState()">${p.memo}</textarea>
    </div>
    <div class="sh-sec" style="margin-top:10px;padding-bottom:8px;">
      <button class="btn-full" style="background:rgba(245,97,92,.1);border:1px solid var(--red);color:var(--red);" onclick="deleteProblem('${pid}')">🗑️ 이 문제 삭제</button>
    </div>`;
  document.getElementById('overlay').classList.add('open');
}

function changeDetailSubj(pid,id,el,color){
  S.problems[pid].subjectId=id; saveState();
  document.querySelectorAll('#detSubjPicker .subj-chip').forEach(e=>{
    e.classList.remove('sel'); e.style.borderColor=''; e.style.color=''; e.style.background='';
  });
  el.classList.add('sel'); el.style.borderColor=color; el.style.color=color; el.style.background=color+'18';
}

function saveDetailNum(pid){
  const v=document.getElementById('editNum')?.value.trim();
  if(!v){ showToast('번호 입력해주세요'); return; }
  S.problems[pid].num=v; saveState();
  document.querySelector('.sh-title').textContent=v;
  showToast('저장됨 ✅');
}

function setDetailRound(pid,r,val){
  const p=S.problems[pid]; if(!p)return;
  const prev=p.rounds[r].result;
  const isToggleOff = prev===val;
  p.rounds[r].result=isToggleOff?null:val;
  p.rounds[r].completedDate=isToggleOff?null:today();
  if(!isToggleOff) rescheduleNext(p, r, today(), val);
  saveState();
  openDetail(pid);
  if(page==='today') document.getElementById('content').innerHTML=renderToday();
}

function deleteProblem(pid){
  if(!confirm('이 문제를 삭제할까요?'))return;
  delete S.problems[pid]; saveState();
  closeSheet(); showPage(page); showToast('삭제됨');
}

// ════════════════════════════════════════════
//  CALENDAR PAGE
// ════════════════════════════════════════════
function renderCal(){
  const now=new Date();
  if(!calYear){ calYear=now.getFullYear(); calMonth=now.getMonth(); }
  if(!calSelectedDate) calSelectedDate=today();

  const td=today();
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  const startDow=firstDay.getDay();
  const activeDates=getDatesWithActivity();

  function dotsForDate(ds){
    const revs=getReviewsForDate(ds);
    const created=getCreatedOnDate(ds);
    const pending=revs.filter(r=>r.round.result===null&&r.round.scheduledDate>=td).length;
    const done=revs.filter(r=>r.round.result!==null).length;
    const missed=revs.filter(r=>r.round.result===null&&r.round.scheduledDate<td).length;
    let dots='';
    if(missed>0) dots+=`<div class="dot" style="background:var(--red)"></div>`;
    if(pending>0) dots+=`<div class="dot" style="background:var(--accent)"></div>`;
    if(done>0) dots+=`<div class="dot" style="background:var(--green)"></div>`;
    if(created.length>0) dots+=`<div class="dot" style="background:var(--yellow)"></div>`;
    return dots;
  }

  const DOWS=['일','월','화','수','목','금','토'];
  let grid=DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<startDow;i++) grid+=`<div></div>`;
  for(let d=1;d<=lastDay.getDate();d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=(startDow+d-1)%7;
    const isTd=ds===td, isSel=ds===calSelectedDate, hasAct=activeDates.has(ds);
    const classes=['cal-day', isTd?'today':'', isSel?'selected':'', hasAct?'has-items':'', dow===0?'sunday':dow===6?'saturday':''].filter(Boolean).join(' ');
    grid+=`<div class="${classes}" onclick="calSelect('${ds}')">
      <div class="dn">${d}</div>
      <div class="dc">${dotsForDate(ds)}</div>
    </div>`;
  }

  // Build selected date detail
  const selRevs=getReviewsForDate(calSelectedDate);
  const selCreated=getCreatedOnDate(calSelectedDate);
  // Missed reviews scheduled before today but not done, displayed on calSelectedDate
  const selMissed = selRevs.filter(({round})=>round.result===null && calSelectedDate < td);
  const selDone = selRevs.filter(({round})=>round.result!==null);
  const selPending = selRevs.filter(({round})=>round.result===null && calSelectedDate >= td);

  let detail='';
  if(selRevs.length===0 && selCreated.length===0){
    detail=`<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px;">이 날은 일정이 없어요</div>`;
  }

  // Created problems section
  if(selCreated.length>0){
    detail+=`<div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;">📝 처음 푼 문제</div>`;
    selCreated.forEach(p=>{
      const subj=getSubj(p.subjectId);
      detail+=`<div class="cal-item" onclick="openDetail('${p.id}')">
        <div class="cal-item-num">${p.num}</div>
        <div class="cal-item-info">
          <div style="font-size:13px;font-weight:600">${subj?.name||'—'}</div>
          <div class="cal-item-sub">${p.firstResult==='O'?'⭕ 정답':'❌ 오답'}${p.memo?' · '+p.memo:''}</div>
        </div>
      </div>`;
    });
  }

  // Missed reviews for this date
  if(selMissed.length>0){
    detail+=`<div style="font-size:11px;font-weight:700;color:var(--red);letter-spacing:1px;margin:${selCreated.length?12:0}px 0 8px;text-transform:uppercase;">⚠️ 못한 복습 <span style="font-weight:400">(${selMissed.length}건)</span></div>`;
    selMissed.forEach(({p,round})=>{
      const subj=getSubj(p.subjectId);
      detail+=`<div class="cal-item" style="border-left:3px solid var(--red);padding-left:8px;" onclick="openDetail('${p.id}')">
        <div class="cal-item-num">${p.num}</div>
        <div class="cal-item-info">
          <div style="font-size:13px;font-weight:600">${ROUND_NAMES[round.round]} <span class="missed-tag">미완료</span></div>
          <div class="cal-item-sub">${subj?.name||'—'}</div>
        </div>
        <div class="cal-item-action">
          <button class="cal-ox-sm ${round.result==='O'?'o-a':''}" onclick="event.stopPropagation();calMarkRound('${p.id}',${round.round},'O')">O</button>
          <button class="cal-ox-sm ${round.result==='X'?'x-a':''}" onclick="event.stopPropagation();calMarkRound('${p.id}',${round.round},'X')">X</button>
        </div>
      </div>`;
    });
  }

  // Pending reviews for this date
  if(selPending.length>0){
    detail+=`<div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;margin:${selCreated.length||selMissed.length?12:0}px 0 8px;text-transform:uppercase;">📌 복습 예정 (${selPending.length}건)</div>`;
    selPending.forEach(({p,round})=>{
      const subj=getSubj(p.subjectId);
      detail+=`<div class="cal-item" onclick="openDetail('${p.id}')">
        <div class="cal-item-num">${p.num}</div>
        <div class="cal-item-info">
          <div style="font-size:13px;font-weight:600">${ROUND_NAMES[round.round]} ⬜</div>
          <div class="cal-item-sub">${subj?.name||'—'}</div>
        </div>
        <div class="cal-item-action">
          <button class="cal-ox-sm" onclick="event.stopPropagation();calMarkRound('${p.id}',${round.round},'O')">O</button>
          <button class="cal-ox-sm" onclick="event.stopPropagation();calMarkRound('${p.id}',${round.round},'X')">X</button>
        </div>
      </div>`;
    });
  }

  // Done reviews
  if(selDone.length>0){
    detail+=`<div style="font-size:11px;font-weight:700;color:var(--green);letter-spacing:1px;margin:${selCreated.length||selMissed.length||selPending.length?12:0}px 0 8px;text-transform:uppercase;">✅ 완료 (${selDone.length}건)</div>`;
    selDone.forEach(({p,round})=>{
      const subj=getSubj(p.subjectId);
      detail+=`<div class="cal-item" style="opacity:.7" onclick="openDetail('${p.id}')">
        <div class="cal-item-num">${p.num}</div>
        <div class="cal-item-info">
          <div style="font-size:13px;font-weight:600">${ROUND_NAMES[round.round]} ${round.result==='O'?'⭕':'❌'}</div>
          <div class="cal-item-sub">${subj?.name||'—'}</div>
        </div>
        <div class="cal-item-action">
          <button class="cal-ox-sm ${round.result==='O'?'o-a':''}" onclick="event.stopPropagation();calMarkRound('${p.id}',${round.round},'O')">O</button>
          <button class="cal-ox-sm ${round.result==='X'?'x-a':''}" onclick="event.stopPropagation();calMarkRound('${p.id}',${round.round},'X')">X</button>
        </div>
      </div>`;
    });
  }

  // ── Problem input panel for selected date ──
  const isPast = calSelectedDate <= td; // allow today and past
  let inputPanel = '';
  if(isPast){
    const subjChips = S.subjects.map(s=>{
      const sel = calInputSubj===s.id;
      return `<div class="subj-chip ${sel?'sel':''}"
        style="${sel?`border-color:${s.color};color:${s.color};background:${s.color}18`:''}"
        onclick="calPickSubj('${s.id}','${s.color}')">${s.name}</div>`;
    }).join('');

    inputPanel = `<div class="cal-input-panel">
      <div class="cal-input-toggle" onclick="toggleCalInput()">
        <span>✏️ 이 날 문제 추가</span>
        <span class="ci-arrow ${calInputOpen?'open':''}">▼</span>
      </div>
      <div class="cal-input-body ${calInputOpen?'open':''}">
        <div class="field-label">과목</div>
        <div class="subj-chips">${subjChips}</div>
        <div class="field-label">문제 번호</div>
        <input class="text-input mono-input" id="calInNum" type="text"
          placeholder="예: 15  또는  1-10"
          onkeydown="if(event.key==='Enter')addCalProblems()">
        <div class="field-label">결과</div>
        <div class="ox-row">
          <button class="ox-big ${calInputOX==='O'?'o-sel':''}" onclick="calPickOX('O')">⭕ 맞음</button>
          <button class="ox-big ${calInputOX==='X'?'x-sel':''}" onclick="calPickOX('X')">❌ 틀림</button>
        </div>
        <div class="field-label">메모 (선택)</div>
        <textarea class="text-input" id="calInMemo" rows="2" placeholder="핵심 키워드, 틀린 이유 ..."></textarea>
        <button class="add-btn" onclick="addCalProblems()">+ ${calSelectedDate===td?'오늘':'이 날'} 문제 추가</button>
      </div>
    </div>`;
  }

  return `<div class="cal-wrap">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="calPrev()">‹</button>
      <div class="cal-month">${calYear}년 ${calMonth+1}월</div>
      <button class="cal-nav-btn" onclick="calNext()">›</button>
    </div>
    <div class="cal-grid">${grid}</div>
    <div class="cal-detail">
      <div class="cal-detail-title">📅 ${fmtKo(calSelectedDate)}</div>
      ${detail}
      ${inputPanel}
    </div>
  </div><div style="height:20px"></div>`;
}

function calSelect(ds){
  calSelectedDate=ds;
  calInputOpen=false;
  calInputOX=null;
  document.getElementById('content').innerHTML=renderCal();
}
function calPrev(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} document.getElementById('content').innerHTML=renderCal(); }
function calNext(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} document.getElementById('content').innerHTML=renderCal(); }

function toggleCalInput(){
  calInputOpen=!calInputOpen;
  document.getElementById('content').innerHTML=renderCal();
}

function calPickSubj(id,color){
  calInputSubj=id;
  document.querySelectorAll('.cal-input-body .subj-chip').forEach(e=>{
    const s=S.subjects.find(x=>x.id===id);
    const mine=s&&e.textContent.trim()===s.name;
    e.classList.toggle('sel',mine);
    if(mine){e.style.borderColor=color;e.style.color=color;e.style.background=color+'18';}
    else{e.style.borderColor='';e.style.color='';e.style.background='';}
  });
}

function calPickOX(v){
  calInputOX=v;
  document.querySelectorAll('.cal-input-body .ox-big').forEach(b=>b.classList.remove('o-sel','x-sel'));
  const btns=document.querySelectorAll('.cal-input-body .ox-big');
  if(v==='O') btns[0].classList.add('o-sel');
  else btns[1].classList.add('x-sel');
}

function addCalProblems(){
  const raw=(document.getElementById('calInNum')?.value||'').trim();
  if(!raw){ showToast('문제 번호를 입력해주세요'); return; }
  if(!calInputOX){ showToast('맞았는지 틀렸는지 체크해주세요'); return; }
  const memo=(document.getElementById('calInMemo')?.value||'').trim();
  const parts=raw.split(',').map(p=>p.trim()).filter(Boolean);
  let count=0;
  parts.forEach(part=>{
    const dash=part.split('-');
    if(dash.length===2&&!isNaN(dash[0])&&!isNaN(dash[1])){
      const from=parseInt(dash[0]),to=parseInt(dash[1]);
      for(let n=from;n<=to;n++){ addProblem(String(n),calInputSubj,calSelectedDate,calInputOX,memo); count++; }
    } else {
      addProblem(part,calInputSubj,calSelectedDate,calInputOX,memo); count++;
    }
  });
  calInputOX=null;
  calInputOpen=false;
  showToast(`${count}문제 추가 ✅`);
  document.getElementById('content').innerHTML=renderCal();
}

function calMarkRound(pid, roundIdx, result){
  const p=S.problems[pid]; if(!p)return;
  const round=p.rounds[roundIdx]; if(!round)return;
  const prev=round.result;
  const isToggleOff = prev===result;
  if(isToggleOff){ round.result=null; round.completedDate=null; }
  else { round.result=result; round.completedDate=today(); rescheduleNext(p, roundIdx, today(), result); }
  saveState();
  document.getElementById('content').innerHTML=renderCal();
  showToast(result==='O'?'✅ 정답 기록':'❌ 오답 기록');
}

// ════════════════════════════════════════════
//  HISTORY PAGE
// ════════════════════════════════════════════
function renderHist(){
  const probs=Object.values(S.problems).sort((a,b)=>{
    if(b.createdDate!==a.createdDate) return b.createdDate.localeCompare(a.createdDate);
    const na=parseFloat(a.num)||0,nb=parseFloat(b.num)||0; return na-nb;
  });

  const chips=[{k:'all',l:'전체'},{k:'wrong',l:'오답 포함'},{k:'done',l:'완료'}];
  let html=`<div class="hist-filter">`;
  chips.forEach(c=>{ html+=`<div class="chip ${histFilter===c.k?'active':''}" onclick="setHistFilter('${c.k}')">${c.l}</div>`; });

  S.subjects.forEach(s=>{
    html+=`<div class="chip ${histFilter===s.id?'active':''}" onclick="setHistFilter('${s.id}')"
      style="${histFilter===s.id?`background:${s.color}18;border-color:${s.color};color:${s.color}`:''}">${s.name}</div>`;
  });
  html+=`</div>`;

  let shown=0;
  probs.forEach(p=>{
    const hasWrong=p.rounds.some(r=>r.result==='X')||p.firstResult==='X';
    const allDone=isCompleted(p);
    if(histFilter==='wrong'&&!hasWrong)return;
    if(histFilter==='done'&&!allDone)return;
    if(S.subjects.find(s=>s.id===histFilter)&&p.subjectId!==histFilter)return;
    shown++;
    const subj=getSubj(p.subjectId);
    const sTag=subj?`<span class="subj-pip" style="background:${subj.color}18;color:${subj.color}">${subj.name}</span>`:'';
    const rdots=p.rounds.map((r,i)=>{
      const cls=r.result==='O'?'o':r.result==='X'?'x':'pending';
      return`<div class="hist-round-dot ${cls}">${i+1}${r.result||''}`;+`</div>`;
    }).join('');
    html+=`<div class="hist-card" onclick="openDetail('${p.id}')">
      <div class="hist-top">
        <span class="hist-num">${p.num}</span>${sTag}
        <span class="hist-date">${fmtShort(p.createdDate)}</span>
        ${p.firstResult==='O'?'<span style="color:var(--green);font-size:12px">⭕</span>':'<span style="color:var(--red);font-size:12px">❌</span>'}
      </div>
      <div class="hist-rounds">${rdots}</div>
    </div>`;
  });

  if(shown===0) html+=`<div class="empty"><div class="em">🔍</div><div class="msg">해당 문제 없음</div></div>`;
  html+=`<div style="height:20px"></div>`;
  return html;
}

function setHistFilter(f){ histFilter=f; document.getElementById('content').innerHTML=renderHist(); }

// ════════════════════════════════════════════
//  SETTINGS PAGE
// ════════════════════════════════════════════
function renderSettings(){
  const swatches=PALETTE.map(c=>`<div class="cswatch ${pickedColor===c?'sel':''}" style="background:${c}" onclick="pickSwatch('${c}',this)"></div>`).join('');
  const subjRows=S.subjects.map(s=>`
    <div class="subj-row">
      <div class="subj-dot" style="background:${s.color}"></div>
      <span class="subj-name">${s.name}</span>
      <button class="del-btn" onclick="delSubj('${s.id}')">×</button>
    </div>`).join('');

  const intInfo=[['1일 후','#4f8ef7'],['3일 후','#22d98a'],['7일 후','#f7b731'],['14일 후','#f472b6'],['30일 후','#7c5cfc']]
    .map((x,i)=>`<div class="int-row">
      <span class="int-badge" style="background:${x[1]}22;color:${x[1]}">${x[0]}</span>
      <span class="int-label">${ROUND_NAMES[i]} · 기억 고착률 ${[40,60,70,80,85][i]}%↑</span>
    </div>`).join('');

  const totalP=Object.keys(S.problems).length;
  const totalRev=Object.values(S.problems).reduce((a,p)=>a+p.rounds.filter(r=>r.result!==null).length,0);
  const totalMissed=Object.values(S.problems).reduce((a,p)=>a+p.rounds.filter(r=>r.result===null&&r.scheduledDate<today()).length,0);
  const totalWrong=Object.values(S.problems).reduce((a,p)=>a+(p.rounds.some(r=>r.result==='X')?1:0),0);

  // Weekly heatmap (last 7 days)
  const td=today();
  const weekDays=['일','월','화','수','목','금','토'];
  let weekCells='';
  for(let i=6;i>=0;i--){
    const ds=addDays(td,-i);
    const revs=getReviewsForDate(ds);
    const done=revs.filter(r=>r.round.result!==null).length;
    const d=new Date(ds+'T00:00:00');
    const label=weekDays[d.getDay()];
    const cls=done===0?'wc-none':done<=2?'wc-low':done<=5?'wc-mid':'wc-hi';
    weekCells+=`<div class="week-cell ${cls}"><span>${done||''}</span><span class="week-day-label">${label}</span></div>`;
  }

  // Subject stats
  const subjStats=S.subjects.map(s=>{
    const probs=Object.values(S.problems).filter(p=>p.subjectId===s.id);
    const revDone=probs.reduce((a,p)=>a+p.rounds.filter(r=>r.result!==null).length,0);
    const revTotal=probs.length*MAX_ROUNDS;
    const pct=revTotal?Math.round(revDone/revTotal*100):0;
    return `<div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:12px;font-weight:600;color:${s.color}">${s.name}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)">${probs.length}문제 · ${pct}%</span>
      </div>
      <div class="pbar"><div class="pbar-fill" style="width:${pct}%;background:linear-gradient(90deg,${s.color},${s.color}aa)"></div></div>
    </div>`;
  }).join('');

  return`<div class="settings-wrap">
    <div class="set-card">
      <div class="set-title">📊 통계</div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;text-align:center;margin-bottom:12px;">
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--accent)">${totalP}</div>
          <div style="font-size:10px;color:var(--muted)">총 문제</div>
        </div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--green)">${totalRev}</div>
          <div style="font-size:10px;color:var(--muted)">완료 복습</div>
        </div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--red)">${totalMissed}</div>
          <div style="font-size:10px;color:var(--muted)">밀린 복습</div>
        </div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--yellow)">${totalWrong}</div>
          <div style="font-size:10px;color:var(--muted)">오답 문제</div>
        </div>
      </div>
      <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;">최근 7일 복습 완료</div>
      <div class="week-row">${weekCells}</div>
    </div>

    ${S.subjects.length>0?`<div class="set-card">
      <div class="set-title">📈 과목별 진도</div>
      ${subjStats||'<div style="color:var(--muted);font-size:13px;text-align:center;padding:8px">문제가 없어요</div>'}
    </div>`:''}

    <div class="set-card">
      <div class="set-title">📚 과목 관리</div>
      <div id="subjListWrap">${subjRows}</div>
      <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:12px;">
        <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;margin-bottom:8px;">색상 선택</div>
        <div class="color-row" id="colorRowEl">${swatches}</div>
        <div class="add-row">
          <input class="text-input" id="newSubjName" placeholder="과목명" style="flex:1;padding:9px 12px;">
          <button class="btn-sm btn-pri" onclick="addSubj()">추가</button>
        </div>
      </div>
    </div>

    <div class="set-card">
      <div class="set-title">🧠 복습 간격 (SM-2)</div>
      ${intInfo}
    </div>

    <div class="set-card">
      <div class="set-title">💾 데이터</div>
      <button class="btn-full btn-pri" onclick="exportData()">📤 내보내기 (JSON)</button>
      <button class="btn-full btn-ghost" onclick="importTrigger()">📥 불러오기</button>
      <button class="btn-full btn-danger" onclick="resetAll()">🗑️ 전체 초기화</button>
    </div>
    <div style="text-align:center;padding:12px;font-size:11px;color:var(--muted);line-height:1.8;">Ebbinghaus 망각 곡선 · SuperMemo SM-2<br>데이터는 이 기기에 저장됩니다</div>
  </div>`;
}

function pickSwatch(c,el){
  pickedColor=c;
  document.querySelectorAll('#colorRowEl .cswatch').forEach(e=>e.classList.remove('sel'));
  el.classList.add('sel');
}

function addSubj(){
  const name=(document.getElementById('newSubjName')?.value||'').trim();
  if(!name){ showToast('이름 입력해주세요'); return; }
  if(S.subjects.find(s=>s.name===name)){ showToast('이미 있어요'); return; }
  S.subjects.push({id:'s'+Date.now(),name,color:pickedColor});
  saveState(); document.getElementById('content').innerHTML=renderSettings();
  showToast(`"${name}" 추가됨`);
}

function delSubj(id){
  const s=S.subjects.find(x=>x.id===id); if(!s)return;
  if(!confirm(`"${s.name}" 삭제?\n해당 과목 문제는 과목 미지정 상태가 됩니다.`))return;
  S.subjects=S.subjects.filter(x=>x.id!==id);
  Object.values(S.problems).forEach(p=>{ if(p.subjectId===id)p.subjectId=''; });
  saveState(); showPage('settings');
}

function resetAll(){
  if(!confirm('모든 데이터를 초기화할까요?'))return;
  S=defaultState(); saveState(); showPage('today'); showToast('초기화 완료');
}

// ════════════════════════════════════════════
//  IMPORT / EXPORT
// ════════════════════════════════════════════
function exportData(){
  const b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download=`review_${today()}.json`; a.click(); showToast('저장됨 💾');
}
function importTrigger(){ document.getElementById('fileIn').click(); }
function importFile(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{ try{ S=JSON.parse(ev.target.result); saveState(); showPage(page); showToast('불러오기 완료 ✅'); }catch{ showToast('오류 ❌'); } };
  r.readAsText(f); e.target.value='';
}

// ════════════════════════════════════════════
//  SHEET
// ════════════════════════════════════════════
function closeSheet(){ document.getElementById('overlay').classList.remove('open'); }
function closeSheetOn(e){ if(e.target===document.getElementById('overlay')) closeSheet(); }

// ════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ════════════════════════════════════════════
//  SERVICE WORKER
// ════════════════════════════════════════════
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

// ════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════
document.getElementById('topDate').textContent = todayKo().toUpperCase();
if(S.subjects[0]){ inputSubj=S.subjects[0].id; calInputSubj=S.subjects[0].id; }
showPage('today');
</script>
</body>
</html>
